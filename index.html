<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Gastos</title>

  <!-- Telegram Web App -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 15px;
  background: #f5f5f5;
}

/* HEADER */
h1 {
  font-size: 22px;
  margin-bottom: 15px;
}

/* MENÚ VERTICAL */
#menu {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

#menu button {
  padding: 12px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: white;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  text-align: left;
}

/* FORMULARIOS */
input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BOTÓN GUARDAR */
button {
  cursor: pointer;
}

button:last-child {
  background: #007bff;
  color: white;
}

/* CONTENIDO */
#contenido {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
  
* {
  box-sizing: border-box;
}

/* CONTENEDOR PRINCIPAL */
#contenido {
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

/* INPUTS */
input, select {
  width: 100%;
  max-width: 100%;
  padding: 10px;
  margin: 5px 0 12px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BOTÓN */
button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
}

</style>
  
</head>
<body>

  <h1>🏠 Control de Gastos</h1>

  <!-- MENÚ -->
  <div id="menu">
    <button onclick="mostrarSeccion('agua')">💧 Agua</button>
    <button onclick="mostrarSeccion('energia')">⚡ Energía</button>
    <button onclick="mostrarSeccion('gasolina')">⛽ Gasolina</button>
    <button onclick="mostrarSeccion('vehiculos')">🚗 Vehículos</button>
    <button onclick="mostrarSeccion('dashboard')">📊 Dashboard</button>

    <button onclick="testDB()">Probar conexión</button>
  </div>

  <hr>

  <!-- CONTENEDOR DINÁMICO -->
  <div id="contenido"></div>

  <script src="app.js"></script>

</body>
</html>
